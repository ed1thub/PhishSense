<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishSense</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/app.js"></script>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>PhishSense</h1>
            <p>Paste a suspicious email and get a phishing score, red flags, and an AI explanation.</p>
        </div>

        <div class="layout">
            <section class="card">
                <h2>Analyze Email</h2>

                <div class="sample-actions">
                    <button type="button" class="sample-btn" data-sample="phishing">Load Phishing Sample</button>
                    <button type="button" class="sample-btn" data-sample="benign">Load Safe Sample</button>
                    <button type="button" class="sample-btn secondary" id="clearBtn">Clear</button>
                </div>

                <label for="sender">Sender Email</label>
                <input id="sender" type="text" placeholder="support@example.com">

                <label for="subject">Subject</label>
                <input id="subject" type="text" placeholder="Urgent: Verify your account">

                <label for="url">Suspicious URL (optional)</label>
                <input id="url" type="text" placeholder="https://bit.ly/example">

                <label for="body">Email Body</label>
                <textarea id="body" rows="12" placeholder="Paste the email body here..."></textarea>

                <button id="analyzeBtn" class="primary-btn">Analyze Email</button>
            </section>

            <section class="card">
                <h2>Results</h2>
                <div id="results" class="results-empty">
                    <p class="muted">Your phishing analysis will appear here.</p>
                </div>
            </section>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
